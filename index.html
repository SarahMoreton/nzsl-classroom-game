<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Wordle + Connections</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 16px;
  margin: 6px;
  font-size: 16px;
  cursor: pointer;
}

h1 { margin-bottom: 10px; }

/* ---------- TILE ---------- */
.tile {
  border: 2px solid #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

/* ---------- WORDLE ---------- */
#wordleGrid {
  display: grid;
  gap: 8px;
  justify-content: center;
}

.wordleRow {
  display: grid;
  gap: 6px;
}

.wordleRow .tile {
  width: 50px;
  height: 50px;
  font-size: 22px;
}

/* Wordle colours */
.correct { background: #6aaa64; color: white; }
.wrong   { background: #c9b458; color: black; }
.incorrect { background: #000; color: white; }

/* Wordle choices */
#choices {
  margin-top: 12px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.choiceBtn:disabled {
  opacity: 0.4;
  cursor: default;
}

/* ---------- CONNECTIONS ---------- */
.connectionsGrid {
  display: grid;
  grid-template-columns: repeat(4, 110px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.connectionsGrid .tile {
  height: 80px;
  cursor: pointer;
}

.selected { border: 3px solid blue; }
.solved   { background: #6aaa64; color: white; }

/* ---------- CONTROLS ---------- */
#lengthSelect {
  margin: 8px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>NZSL Wordle + Connections</h1>

<!-- ✅ MENU -->
<button onclick="showWordleMenu()">Wordle</button>
<button onclick="startConnections()">Connections</button>
<button onclick="restart()">Restart</button>

<h3 id="message"></h3>
<div id="controls"></div>
<div id="game"></div>

<script>
/* =========================
   WORD LIST
========================= */
const WORDS = [
  "DOG","CAT","COW","PIG","BIRD","FISH",
  "RUN","WALK","JUMP","SIT",
  "MUM","DAD","BOY","GIRL",
  "SUN","RAIN","WIND","COLD",
  "APPLE","PEAR","MILK","CAKE",
  "CAR","BUS","BIKE","TRAIN",
  "BOOK","BAG","HAT","COAT"
];

/* =========================
   CONNECTION GROUPS
========================= */
const CONNECTION_GROUPS = [
  ["DOG","CAT","COW","PIG"],
  ["RUN","WALK","JUMP","SIT"],
  ["MUM","DAD","BOY","GIRL"],
  ["SUN","RAIN","WIND","COLD"]
];

/* =========================
   WORDLE STATE
========================= */
let answer = "";
let options = [];
let row = 0;

/* =========================
   WORDLE MENU
========================= */
function showWordleMenu() {
  controls.innerHTML = `
    <label><strong>Word length:</strong></label>
    <select id="lengthSelect">
      <option value="3">3 letters</option>
      <option value="4">4 letters</option>
      <option value="5" selected>5 letters</option>
    </select><br>
    <button onclick="startWordle(false)">New Wordle</button>
    <button onclick="startWordle(true)">Daily Wordle</button>
  `;
  game.innerHTML = "";
  message.textContent = "Choose New or Daily Wordle";
}

/* =========================
   START WORDLE
========================= */
function startWordle(daily) {
  row = 0;
  game.innerHTML = "";

  const len = Number(lengthSelect.value);
  const pool = WORDS.filter(w => w.length === len);
  const seed = daily ? Math.floor(Date.now() / 86400000) : Math.random();

  options = [...pool].sort(() => seed - 0.5).slice(0, 6);
  answer = options[Math.floor(seed * options.length)];

  buildWordle(len);
  showChoices();
  message.textContent = "Choose a word";
}

function buildWordle(len) {
  const grid = document.createElement("div");
  grid.id = "wordleGrid";

  for (let r = 0; r < 6; r++) {
    const rowDiv = document.createElement("div");
    rowDiv.className = "wordleRow";
    rowDiv.style.gridTemplateColumns = `repeat(${len}, 50px)`;

    for (let i = 0; i < len; i++) {
      rowDiv.appendChild(document.createElement("div")).className = "tile";
    }
    grid.appendChild(rowDiv);
  }
  game.appendChild(grid);
}

function showChoices() {
  const div = document.createElement("div");
  div.id = "choices";

  options.forEach(word => {
    const b = document.createElement("button");
    b.textContent = word;
    b.className = "choiceBtn";
    b.onclick = () => {
      b.disabled = true;
      submitGuess(word);
    };
    div.appendChild(b);
  });

  game.appendChild(div);
}

/* =========================
   WORDLE LOGIC
========================= */
function submitGuess(word) {
  const tiles = wordleGrid.children[row].children;
  const count = {};

  for (const c of answer) count[c] = (count[c] || 0) + 1;

  for (let i = 0; i < answer.length; i++) {
    tiles[i].textContent = word[i];
    if (word[i] === answer[i]) {
      tiles[i].classList.add("correct");
      count[word[i]]--;
    }
  }

  for (let i = 0; i < answer.length; i++) {
    if (tiles[i].classList.contains("correct")) continue;
    if (count[word[i]] > 0) {
      tiles[i].classList.add("wrong");
      count[word[i]]--;
    } else {
      tiles[i].classList.add("incorrect");
    }
  }

  if (word === answer) {
    message.textContent = "✅ Correct!";
    disableChoices();
    return;
  }

  row++;

  if (row === 6) {
    message.textContent = `❌ The word was ${answer}`;
    disableChoices();
  }
}

function disableChoices() {
  document.querySelectorAll(".choiceBtn")
    .forEach(b => b.disabled = true);
}

/* =========================
   CONNECTIONS
========================= */
let selected = [];
let solved = 0;

function startConnections() {
  game.innerHTML = "";
  controls.innerHTML = "";
  message.textContent = "Select 4 matching words";

  selected = [];
  solved = 0;

  const words = CONNECTION_GROUPS.flat().sort(() => Math.random() - 0.5);
  const grid = document.createElement("div");
  grid.className = "connectionsGrid";

  words.forEach(word => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = word;
    tile.onclick = () => toggle(tile);
    grid.appendChild(tile);
  });

  game.appendChild(grid);

  const btn = document.createElement("button");
  btn.textContent = "Submit Group";
  btn.onclick = checkGroup;
  game.appendChild(btn);
}

function toggle(tile) {
  if (tile.classList.contains("solved")) return;
  tile.classList.toggle("selected");

  selected = [...document.querySelectorAll(".selected")];
  if (selected.length > 4) {
    selected[0].classList.remove("selected");
  }
}

function checkGroup() {
  if (selected.length !== 4) {
    message.textContent = "Select 4 words";
    return;
  }

  const words = selected.map(t => t.textContent);
  const match = CONNECTION_GROUPS.find(
    g => words.every(w => g.includes(w))
  );

  if (match) {
    selected.forEach(t => {
      t.classList.remove("selected");
      t.classList.add("solved");
      t.onclick = null;
    });
    solved++;
    message.textContent = "✅ Correct group!";
    if (solved === 4) message.textContent = "🎉 All groups solved!";
  } else {
    message.textContent = "❌ Not a group";
    selected.forEach(t => t.classList.remove("selected"));
  }

  selected = [];
}

/* =========================
   RESTART
========================= */
function restart() {
  game.innerHTML = "";
  controls.innerHTML = "";
  message.textContent = "Choose a game";
}
</script>

</body>
</html>
