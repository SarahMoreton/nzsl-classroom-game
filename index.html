<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NZSL Connections + Wordle PRO</title>


<style>
/* ===== BASE PAGE ===== */
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f4f4;
  margin: 0;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

/* Container */
#game {
  min-height: 300px;
}

/* ===== CONNECTIONS ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 120px);
  gap: 10px;
  justify-content: center;
  margin: 20px auto;
}

.tile {
  width: 120px;
  height: 120px;
  border: 3px solid #333;
  border-radius: 10px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.selected {
  border: 4px solid blue;
}

/* ===== WORDLE COLOURS (important) ===== */
.correct {
  background-color: #6aaa64;
  color: white;
}

.present {
  background-color: #c9b458;
  color: black;
}

.wrong {
  background-color: #787c7e;
  color: white;
}

/* ===== WORDLE GRID ===== */
#grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
  margin-top: 20px;
}

#grid .tile {
  width: 50px;
  height: 50px;
  font-size: 24px;
  font-weight: bold;
  line-height: 50px;
  text-align: center;
}

/* Wordle word list */
#wordleChoices {
  font-size: 1.4em;
  margin: 20px;
}
</style>
</head>

<body>

<h1>NZSL Classroom Game</h1>

<button onclick="startConnections()">Connections</button>
<button onclick="startWordle()">Wordle</button>
<button onclick="newGame()">🔄 New Game</button>

<h3 id="message"></h3>
<div id="wordleChoices" style="margin:20px; font-size:1.5em;"></div>
<div id="game"></div>

<script>

// ---------------- DATA ----------------
  // ---------------- WORDLE WORD BANK ----------------
// Used ONLY for Wordle (not Connections)
// Words are grouped by length for low readers

const WORDLE_WORDS = {
  3: [
    "DOG",
    "CAT",
    "RUN",
    "EAT",
    "SIT",
    "HAT",
    "SUN",
    "DAY"
  ],

  4: [
    "HELP",
    "HOME",
    "HAND",
    "BOOK",
    "PLAY",
    "READ",
    "WALK",
    "LOOK"
  ],

  5: [
    "HAPPY",
    "TIRED",
    "ANGRY",
    "PROUD",
    "SADLY",
    "SMILE",
    "LAUGH",
    "FRIEND"
  ]
};
const groups = [
  {cat:"Animals", words:["DOG","CAT","FISH","BIRD"]},
  {cat:"Food", words:["APPLE","BREAD","MILK","CARROT"]},
  {cat:"Actions", words:["RUN","EAT","JUMP","SLEEP"]},
  {cat:"Emotions", words:["HAPPY","SAD","ANGRY","TIRED"]}
];

let allWords = groups.flatMap(g=>g.words);

// ---------------- CONNECTIONS ----------------
let selected = [];
let mistakes = 0;


function selectTile(el, word){
  if(el.classList.contains("selected")){
    el.classList.remove("selected");
    selected = selected.filter(w=>w!==word);
  } else if(selected.length < 4){
    el.classList.add("selected");
    selected.push(word);
  }
}

function submitGroup(){
  if(selected.length !== 4) return;

  let correctGroup = groups.find(g =>
    selected.every(w=>g.words.includes(w))
  );

  if(correctGroup){
    document.getElementById("message").innerText = "Correct: " + correctGroup.cat;
    markCorrect(correctGroup.words);
  } else {
    mistakes++;
    document.getElementById("message").innerText =
      mistakes === 3 ? "Careful! Last chance" : "Try again";
  }

  selected = [];
}

function markCorrect(words){
  document.querySelectorAll(".tile").forEach(tile=>{
    let text = tile.innerText.trim();
    if(words.includes(text)){
      tile.style.background = "#6aaa64";
    }
  });
}

// ---------------- WORDLE ----------------
  // -------- WORDLE: DAILY WORD + 5 CHOICES --------

// Pick a repeatable number from today’s date
function getDayIndex() {
  const start = new Date("2024-01-01");
  const today = new Date();
  return Math.floor((today - start) / (1000 * 60 * 60 * 24));
}

// Decide today’s word length: 3, 4, or 5
function getTodayWordLength() {
  const lengths = [3, 4, 5];
  return lengths[getDayIndex() % lengths.length];
}

// Pick today’s answer word
function getTodayAnswer() {
  const length = getTodayWordLength();
  const words = WORDLE_WORDS[length];
  return words[getDayIndex() % words.length];
}

// Pick 5 words (1 answer + 4 distractors)
function getTodayChoices(answer) {
  const length = answer.length;
  const pool = WORDLE_WORDS[length].filter(w => w !== answer);

  // Shuffle pool
  pool.sort(() => Math.random() - 0.5);

  // Take 4 distractors
  const choices = pool.slice(0, 4);
  choices.push(answer);

  // Shuffle final 5
  return choices.sort(() => Math.random() - 0.5);
}

// Show the 5 words as plain text
function showWordleChoices() {
  const answer = getTodayAnswer();
  const choices = getTodayChoices(answer);

  const box = document.getElementById("wordleChoices");
  box.innerText = choices.join("   ");

  return answer;
}

let answer = "";
let attempt = 0;
let currentGuess = "";
function startWordle() {
  answer = showWordleChoices();
  attempt = 0;
  currentGuess = "";

  const game = document.getElementById("game");

  game.innerHTML = `
    <div id="grid"></div>
  `;

  buildGrid();
}


  function buildGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 0; i < 6; i++) {
    const row = document.createElement("div");
    row.style.display = "flex";

    for (let j = 0; j < answer.length; j++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      row.appendChild(tile);
    }

    grid.appendChild(row);
  }
}

function buildBank(){
  let bank = document.getElementById("word-bank");
  bank.innerHTML="";

  allWords.forEach(w=>{
    let div = document.createElement("div");
    div.className="word-option";

    div.innerHTML = `
      <video src="videos/${w}.mp4" muted></video>
      <p>${w}</p>
    `;

    div.onmouseenter = ()=>div.querySelector("video").play();
    div.onmouseleave = ()=>div.querySelector("video").pause();

    div.onclick = ()=>guess(w);

    bank.appendChild(div);
  });
}

function guess(word){
  let row = document.getElementById("grid").children[attempt];

  for(let i = 0; i < word.length; i++){
    row.children[i].innerText = word[i];

    if(word[i] === answer[i]){
      row.children[i].classList.add("correct");
    } else if(answer.includes(word[i])){
      row.children[i].classList.add("present");
    } else {
      row.children[i].classList.add("wrong");
    }
  }

  attempt++;
}
document.addEventListener("keydown", (e) => {
  const grid = document.getElementById("grid");
  if (!grid) return;
  if (!answer) return;
  if (attempt >= 6) return;

  const row = grid.children[attempt];
  if (!row) return;

  // BACKSPACE
  if (e.key === "Backspace") {
    currentGuess = currentGuess.slice(0, -1);
  }

  // ENTER → submit guess and STOP
  else if (e.key === "Enter") {
    if (currentGuess.length === answer.length) {
      guess(currentGuess);
      currentGuess = "";
    }
    return; // IMPORTANT: do not rewrite row after guess
  }

  // LETTER KEY
  else if (/^[a-zA-Z]$/.test(e.key)) {
    if (currentGuess.length < answer.length) {
      currentGuess += e.key.toUpperCase();
    }
  }

  // Update display ONLY while typing
  for (let i = 0; i < answer.length; i++) {
    row.children[i].innerText = currentGuess[i] || "";
  }
});
// ---------------- CONTROLS ----------------
function newGame(){
  startConnections();
}

// LOAD
startConnections();

function startConnections(){
  document.getElementById("message").innerText = "Find 4 groups of 4";
  document.getElementById("wordleChoices").innerText = "";
  const game = document.getElementById("game");

  let shuffled = [...allWords].sort(() => 0.5 - Math.random());

  let html = `<div class="grid">`;
  shuffled.forEach(word => {
    html += `
      <div class="tile" onclick="selectTile(this,'${word}')">
        <strong>${word}</strong>
      </div>
    `;
  });
  html += `</div>
    <button onclick="submitGroup()">Submit</button>`;

  game.innerHTML = html;

  selected = [];
  mistakes = 0;
}
</script>

</body>
</html>
