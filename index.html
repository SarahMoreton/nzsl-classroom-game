<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Wordle + Connections</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 16px;
  margin: 6px;
  font-size: 16px;
  cursor: pointer;
}

.tile {
  border: 2px solid #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

#choices {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 15px;
}

/* Wordle colours */
.correct { background: #6aaa64; color: white; }
.wrong { background: #c9b458; color: black; }
.incorrect { background: #000; color: white; }

/* Connections */
.connectionsGrid {
  display: grid;
  grid-template-columns: repeat(4, 120px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}
.selected { border: 3px solid blue; }
.solved { background: #6aaa64; color: white; }
</style>
</head>

<body>

<h1>NZSL Wordle + Connections</h1>

<button onclick="startWordle()">Wordle</button>
<button onclick="startConnections()">Connections</button>

<h3 id="message"></h3>
<div id="game"></div>

<script>
/* =====================================================
   NZSL-ALIGNED WORD BANK (240+ words)
   Organised by NZSL Dictionary topics
===================================================== */
const TOPICS = {
  animals: [
    "DOG","CAT","COW","SHEEP","HORSE","PIG","GOAT","BIRD","FISH","FROG",
    "BEAR","LION","TIGER","MOUSE","RABBIT","DUCK","CHICKEN","WHALE","DOLPHIN","SHARK"
  ],
  food: [
    "APPLE","BANANA","ORANGE","PEAR","BREAD","CHEESE","MILK","WATER","JUICE","EGG",
    "RICE","PASTA","CAKE","BISCUIT","SOUP","MEAT","CHICKEN","PIZZA","SANDWICH","FISH"
  ],
  people: [
    "MUM","DAD","BABY","CHILD","BOY","GIRL","FAMILY","FRIEND","ADULT","TEACHER",
    "STUDENT","DOCTOR","NURSE","POLICE","WORKER","MAN","WOMAN","GRANDMA","GRANDAD","COUSIN"
  ],
  weather: [
    "SUN","RAIN","WIND","SNOW","CLOUD","STORM","RAINBOW","MOON","STAR","SKY",
    "RIVER","SEA","BEACH","TREE","FLOWER","GRASS","ROCK","MOUNTAIN","FOREST","ISLAND"
  ],
  transport: [
    "CAR","BUS","TRAIN","PLANE","TRUCK","BIKE","BICYCLE","BOAT","SHIP","FERRY",
    "SCOOTER","MOTORBIKE","HELICOPTER","TAXI","VAN","AMBULANCE","POLICECAR","TRACTOR","SUBWAY","TRAM"
  ],
  clothing: [
    "HAT","COAT","SHIRT","PANTS","SHORTS","SKIRT","DRESS","SOCKS","SHOES","JACKET",
    "JUMPER","SCARF","GLOVES","BELT","WATCH","GLASSES","BOOT","SANDALS","HOODIE","UNIFORM"
  ],
  house: [
    "CHAIR","TABLE","COUCH","BED","LAMP","DOOR","WINDOW","CLOCK","PHONE","COMPUTER",
    "FRIDGE","FREEZER","MICROWAVE","TOILET","SHOWER","SINK","CARPET","SHELF","DRAWER","BIN"
  ],
  school: [
    "BOOK","PENCIL","PEN","PAPER","BAG","DESK","BOARD","CLASS","SCHOOL","LESSON",
    "HOMEWORK","TEST","QUIZ","READ","WRITE","DRAW","LEARN","TEACH","STUDY","SPELL"
  ],
  actions: [
    "RUN","WALK","JUMP","SIT","STAND","EAT","DRINK","SLEEP","PLAY","WATCH",
    "LISTEN","LOOK","OPEN","CLOSE","CUT","BUILD","MAKE","CLEAN","HELP","STOP"
  ],
  colours: [
    "RED","BLUE","GREEN","YELLOW","ORANGE","PURPLE","PINK","BLACK","WHITE","BROWN",
    "GREY","GOLD","SILVER","LIGHT","DARK","BRIGHT","PALE","CLEAR","STRONG","SOFT"
  ],
  body: [
    "HEAD","EYES","EARS","NOSE","MOUTH","HAND","ARM","LEG","FOOT","TOE",
    "HEART","BRAIN","TEETH","FACE","BACK","SICK","HURT","PAIN","MEDICINE","REST"
  ],
  feelings: [
    "HAPPY","SAD","ANGRY","EXCITED","TIRED","SCARED","CALM","PROUD","SHY","BRAVE",
    "LOVE","LIKE","HATE","WORRIED","CONFUSED","BORED","SURPRISED","RELAXED","UPSET","OKAY"
  ]
};

/* Flattened word bank for Wordle */
const WORD_BANK = Object.values(TOPICS).flat();

/* =====================================================
   WORDLE – pick 6 visually distinct words
===================================================== */
function tooSimilar(a, b) {
  if (a.slice(-2) === b.slice(-2)) return true;
  let shared = 0;
  for (const c of a) if (b.includes(c)) shared++;
  return shared >= a.length - 1;
}

function pickWordleOptions(length) {
  const pool = WORD_BANK.filter(w => w.length === length);
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const chosen = [];

  for (const w of shuffled) {
    if (chosen.every(x => !tooSimilar(x, w))) {
      chosen.push(w);
    }
    if (chosen.length === 6) break;
  }
  return chosen;
}

/* =====================================================
   WORDLE GAME
===================================================== */
let wordleAnswer = "";
let wordleRow = 0;

function startWordle() {
  game.innerHTML = "";
  wordleRow = 0;

  const length = 5;
  const options = pickWordleOptions(length);
  wordleAnswer = options[Math.floor(Math.random() * options.length)];

  const grid = document.createElement("div");
  grid.id = "wordleGrid";

  for (let r = 0; r < 6; r++) {
    const row = document.createElement("div");
    row.style.display = "grid";
    row.style.gridTemplateColumns = `repeat(${length}, 50px)`;
    row.style.gap = "6px";
    for (let i = 0; i < length; i++) {
      row.appendChild(document.createElement("div")).className = "tile";
    }
    grid.appendChild(row);
  }

  game.appendChild(grid);

  const choices = document.createElement("div");
  choices.id = "choices";
  options.forEach(word => {
    const b = document.createElement("button");
    b.textContent = word;
    b.onclick = () => guessWord(word, b);
    choices.appendChild(b);
  });
  game.appendChild(choices);

  message.textContent = "Choose a word";
}

function guessWord(word, btn) {
  btn.disabled = true;
  const tiles = wordleGrid.children[wordleRow].children;

  for (let i = 0; i < word.length; i++) {
    tiles[i].textContent = word[i];
    tiles[i].className = "tile " +
      (word[i] === wordleAnswer[i] ? "correct" :
       wordleAnswer.includes(word[i]) ? "wrong" : "incorrect");
  }

  if (word === wordleAnswer) {
    message.textContent = "✅ Correct!";
    return;
  }
  wordleRow++;
  if (wordleRow === 6) {
    message.textContent = `❌ The word was ${wordleAnswer}`;
  }
}

/* =====================================================
   CONNECTIONS – random NZSL topics each play
===================================================== */
function startConnections() {
  game.innerHTML = "";
  message.textContent = "Find 4 groups";

  const topicKeys = Object.keys(TOPICS)
    .sort(() => Math.random() - 0.5)
    .slice(0, 4);

  const solutionGroups = topicKeys.map(k =>
    [...TOPICS[k]].sort(() => Math.random() - 0.5).slice(0, 4)
  );

  const words = solutionGroups.flat().sort(() => Math.random() - 0.5);

  let selected = [];
  const grid = document.createElement("div");
  grid.className = "connectionsGrid";

  words.forEach(word => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = word;

    tile.onclick = () => {
      if (tile.classList.contains("solved")) return;
      tile.classList.toggle("selected");
      selected = [...document.querySelectorAll(".selected")];
      if (selected.length > 4) selected[0].classList.remove("selected");
    };

    grid.appendChild(tile);
  });

  game.appendChild(grid);

  const btn = document.createElement("button");
  btn.textContent = "Submit Group";
  btn.onclick = () => {
    if (selected.length !== 4) return;

    const attempt = selected.map(t => t.textContent);
    const match = solutionGroups.find(g => attempt.every(w => g.includes(w)));

    if (match) {
      selected.forEach(t => {
        t.classList.remove("selected");
        t.classList.add("solved");
      });
    } else {
      selected.forEach(t => t.classList.remove("selected"));
    }
  };

  game.appendChild(btn);
}
</script>

</body>
</html>
