<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Wordle + Connections</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 16px;
  margin: 6px;
  font-size: 16px;
  cursor: pointer;
}

.tile {
  border: 2px solid #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

/* ✅ Wordle grid + tile size FIX */
#wordleGrid {
  display: grid;
  gap: 8px;
  justify-content: center;
  margin-top: 15px;
}

.wordleRow {
  display: grid;
  gap: 6px;
}

.wordleRow .tile {
  width: 50px;
  height: 50px;
  font-size: 22px;
}

/* Wordle colours */
.correct { background: #6aaa64; color: white; }
.wrong { background: #c9b458; color: black; }
.incorrect { background: #000; color: white; }

#choices {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 15px;
}

/* Connections */
.connectionsGrid {
  display: grid;
  grid-template-columns: repeat(4, 120px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}
.selected { border: 3px solid blue; }
.solved { background: #6aaa64; color: white; }
</style>
</head>

<body>

<h1>NZSL Wordle + Connections</h1>

<button onclick="startWordle()">Wordle</button>
<button onclick="startConnections()">Connections</button>

<h3 id="message"></h3>
<div id="game"></div>

<script>
/* =====================================================
   NZSL TOPIC WORD BANK (240+)
===================================================== */
const TOPICS = { /* unchanged – your full topic list */ 
  animals:["DOG","CAT","COW","SHEEP","HORSE","PIG","GOAT","BIRD","FISH","FROG","BEAR","LION","TIGER","MOUSE","RABBIT","DUCK","CHICKEN","WHALE","DOLPHIN","SHARK"],
  food:["APPLE","BANANA","ORANGE","PEAR","BREAD","CHEESE","MILK","WATER","JUICE","EGG","RICE","PASTA","CAKE","BISCUIT","SOUP","MEAT","CHICKEN","PIZZA","SANDWICH","FISH"],
  people:["MUM","DAD","BABY","CHILD","BOY","GIRL","FAMILY","FRIEND","ADULT","TEACHER","STUDENT","DOCTOR","NURSE","POLICE","WORKER","MAN","WOMAN","GRANDMA","GRANDAD","COUSIN"],
  weather:["SUN","RAIN","WIND","SNOW","CLOUD","STORM","RAINBOW","MOON","STAR","SKY","RIVER","SEA","BEACH","TREE","FLOWER","GRASS","ROCK","MOUNTAIN","FOREST","ISLAND"],
  transport:["CAR","BUS","TRAIN","PLANE","TRUCK","BIKE","BICYCLE","BOAT","SHIP","FERRY","SCOOTER","MOTORBIKE","HELICOPTER","TAXI","VAN","AMBULANCE","POLICECAR","TRACTOR","SUBWAY","TRAM"],
  clothing:["HAT","COAT","SHIRT","PANTS","SHORTS","SKIRT","DRESS","SOCKS","SHOES","JACKET","JUMPER","SCARF","GLOVES","BELT","WATCH","GLASSES","BOOT","SANDALS","HOODIE","UNIFORM"],
  house:["CHAIR","TABLE","COUCH","BED","LAMP","DOOR","WINDOW","CLOCK","PHONE","COMPUTER","FRIDGE","FREEZER","MICROWAVE","TOILET","SHOWER","SINK","CARPET","SHELF","DRAWER","BIN"],
  school:["BOOK","PENCIL","PEN","PAPER","BAG","DESK","BOARD","CLASS","SCHOOL","LESSON","HOMEWORK","TEST","QUIZ","READ","WRITE","DRAW","LEARN","TEACH","STUDY","SPELL"],
  actions:["RUN","WALK","JUMP","SIT","STAND","EAT","DRINK","SLEEP","PLAY","WATCH","LISTEN","LOOK","OPEN","CLOSE","CUT","BUILD","MAKE","CLEAN","HELP","STOP"],
  colours:["RED","BLUE","GREEN","YELLOW","ORANGE","PURPLE","PINK","BLACK","WHITE","BROWN","GREY","GOLD","SILVER","LIGHT","DARK","BRIGHT","PALE","CLEAR","STRONG","SOFT"],
  body:["HEAD","EYES","EARS","NOSE","MOUTH","HAND","ARM","LEG","FOOT","TOE","HEART","BRAIN","TEETH","FACE","BACK","SICK","HURT","PAIN","MEDICINE","REST"],
  feelings:["HAPPY","SAD","ANGRY","EXCITED","TIRED","SCARED","CALM","PROUD","SHY","BRAVE","LOVE","LIKE","HATE","WORRIED","CONFUSED","BORED","SURPRISED","RELAXED","UPSET","OKAY"]
};

const WORD_BANK = Object.values(TOPICS).flat();

/* =====================================================
   WORDLE – guaranteed 6 choices (FIXED)
===================================================== */
function tooSimilar(a, b) {
  if (a.slice(-2) === b.slice(-2)) return true;
  let shared = 0;
  for (const c of a) if (b.includes(c)) shared++;
  return shared >= a.length - 1;
}

function pickWordleOptions(length) {
  const pool = WORD_BANK.filter(w => w.length === length);
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const chosen = [];

  // Pass 1: strictly distinct
  for (const w of shuffled) {
    if (chosen.every(x => !tooSimilar(x, w))) {
      chosen.push(w);
    }
    if (chosen.length === 6) return chosen;
  }

  // Pass 2: fill remaining slots safely
  for (const w of shuffled) {
    if (!chosen.includes(w)) chosen.push(w);
    if (chosen.length === 6) break;
  }

  return chosen;
}

/* =====================================================
   WORDLE GAME (unchanged logic)
===================================================== */
let wordleAnswer = "";
let wordleRow = 0;

function startWordle() {
  game.innerHTML = "";
  wordleRow = 0;

  const options = pickWordleOptions(5);
  wordleAnswer = options[Math.floor(Math.random()*6)];

  const grid = document.createElement("div");
  grid.id = "wordleGrid";

  for (let r = 0; r < 6; r++) {
    const row = document.createElement("div");
    row.className = "wordleRow";
    row.style.gridTemplateColumns = "repeat(5, 50px)";
    for (let i=0;i<5;i++) row.appendChild(document.createElement("div")).className="tile";
    grid.appendChild(row);
  }

  game.appendChild(grid);

  const choices = document.createElement("div");
  choices.id = "choices";
  options.forEach(w=>{
    const b=document.createElement("button");
    b.textContent=w;
    b.onclick=()=>guessWord(w,b);
    choices.appendChild(b);
  });
  game.appendChild(choices);

  message.textContent="Choose a word";
}
</script>

</body>
</html>
