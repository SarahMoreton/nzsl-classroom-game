<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Wordle + Connections</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 16px;
  margin: 6px;
  font-size: 16px;
  cursor: pointer;
}

.tile {
  border: 2px solid #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

/* ================= WORDLE ================= */

#wordleGrid {
  display: grid;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}

.wordleRow {
  display: grid;
  gap: 6px;
}

.wordleRow .tile {
  width: 50px;
  height: 50px;
  font-size: 22px;
}

.correct   { background: #6aaa64; color: white; }
.wrong     { background: #c9b458; color: black; }
.incorrect { background: #000; color: white; }

#choices {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 15px;
}

/* ================= CONNECTIONS (BIG BOXES) ================= */

.connectionsGrid {
  display: grid;
  grid-template-columns: repeat(4, 160px);
  gap: 16px;
  justify-content: center;
  margin-top: 20px;
}

.connectionsGrid .tile {
  min-height: 120px;
  font-size: 22px;
  padding: 10px;
  box-sizing: border-box;
}

.selected { border: 4px solid blue; }
.solved   { background: #6aaa64; color: white; }
</style>
</head>

<body>

<h1>NZSL Wordle + Connections</h1>

<button onclick="startWordle()">Wordle</button>
<button onclick="startConnections()">Connections</button>
<button onclick="newGame()">New Game</button>

<h3 id="message"></h3>
<div id="game"></div>

<script>
/* ================= NZSL TOPIC WORD BANK ================= */

const TOPICS = {
  animals: [
    "DOG","CAT","COW","SHEEP","HORSE","PIG","GOAT","BIRD","FISH","FROG",
    "BEAR","LION","TIGER","MOUSE","RABBIT","DUCK","CHICKEN","WHALE","DOLPHIN","SHARK"
  ],
  food: [
    "APPLE","BANANA","ORANGE","PEAR","BREAD","CHEESE","MILK","WATER","JUICE","EGG",
    "RICE","PASTA","CAKE","BISCUIT","SOUP","MEAT","CHICKEN","PIZZA","SANDWICH","FISH"
  ],
  people: [
    "MUM","DAD","BABY","CHILD","BOY","GIRL","FAMILY","FRIEND","ADULT","TEACHER",
    "STUDENT","DOCTOR","NURSE","POLICE","WORKER","MAN","WOMAN","GRANDMA","GRANDAD","COUSIN"
  ],
  weather: [
    "SUN","RAIN","WIND","SNOW","CLOUD","STORM","RAINBOW","MOON","STAR","SKY",
    "RIVER","SEA","BEACH","TREE","FLOWER","GRASS","ROCK","MOUNTAIN","FOREST","ISLAND"
  ],
  transport: [
    "CAR","BUS","TRAIN","PLANE","TRUCK","BIKE","BICYCLE","BOAT","SHIP","FERRY",
    "SCOOTER","MOTORBIKE","HELICOPTER","TAXI","VAN","AMBULANCE","POLICECAR","TRACTOR","SUBWAY","TRAM"
  ],
  clothing: [
    "HAT","COAT","SHIRT","PANTS","SHORTS","SKIRT","DRESS","SOCKS","SHOES","JACKET",
    "JUMPER","SCARF","GLOVES","BELT","WATCH","GLASSES","BOOT","SANDALS","HOODIE","UNIFORM"
  ],
  house: [
    "CHAIR","TABLE","COUCH","BED","LAMP","DOOR","WINDOW","CLOCK","PHONE","COMPUTER",
    "FRIDGE","FREEZER","MICROWAVE","TOILET","SHOWER","SINK","CARPET","SHELF","DRAWER","BIN"
  ],
  school: [
    "BOOK","PENCIL","PEN","PAPER","BAG","DESK","BOARD","CLASS","SCHOOL","LESSON",
    "HOMEWORK","TEST","QUIZ","READ","WRITE","DRAW","LEARN","TEACH","STUDY","SPELL"
  ]
};

const WORD_BANK = Object.values(TOPICS).flat();

/* ================= WORDLE ================= */

let wordleAnswer = "";
let wordleRow = 0;
let wordleGridEl = null;

function pickWordleOptions(length) {
  const pool = WORD_BANK.filter(w => w.length === length);
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  while (shuffled.length < 6) shuffled.push(...shuffled);
  return shuffled.slice(0, 6);
}

function startWordle() {
  game.innerHTML = "";
  wordleRow = 0;

  const options = pickWordleOptions(5);
  wordleAnswer = options[Math.floor(Math.random() * options.length)];

  wordleGridEl = document.createElement("div");
  wordleGridEl.id = "wordleGrid";

  for (let r = 0; r < 6; r++) {
    const row = document.createElement("div");
    row.className = "wordleRow";
    row.style.gridTemplateColumns = "repeat(5, 50px)";
    for (let i = 0; i < 5; i++) {
      row.appendChild(document.createElement("div")).className = "tile";
    }
    wordleGridEl.appendChild(row);
  }

  game.appendChild(wordleGridEl);

  const choices = document.createElement("div");
  choices.id = "choices";

  options.forEach(word => {
    const b = document.createElement("button");
    b.textContent = word;
    b.onclick = () => guessWord(word, b);
    choices.appendChild(b);
  });

  game.appendChild(choices);
  message.textContent = "Choose a word";
}

function guessWord(word, button) {
  button.disabled = true;
  const tiles = wordleGridEl.children[wordleRow].children;

  for (let i = 0; i < 5; i++) {
    tiles[i].textContent = word[i];
    tiles[i].className =
      "tile " +
      (word[i] === wordleAnswer[i]
        ? "correct"
        : wordleAnswer.includes(word[i])
        ? "wrong"
        : "incorrect");
  }

  if (word === wordleAnswer) {
    message.textContent = "✅ Correct!";
    return;
  }

  wordleRow++;
  if (wordleRow === 6) {
    message.textContent = `❌ The word was ${wordleAnswer}`;
  }
}

/* ================= CONNECTIONS ================= */

let connectionsSolutions = [];
let selectedTiles = [];

function startConnections() {
  game.innerHTML = "";
  message.textContent = "Find 4 groups";

  const keys = Object.keys(TOPICS)
    .sort(() => Math.random() - 0.5)
    .slice(0, 4);

  connectionsSolutions = keys.map(k => TOPICS[k].slice(0, 4));

  const words = connectionsSolutions.flat().sort(() => Math.random() - 0.5);

  const grid = document.createElement("div");
  grid.className = "connectionsGrid";

  words.forEach(word => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = word;
    tile.onclick = () => toggleTile(tile);
    grid.appendChild(tile);
  });

  game.appendChild(grid);

  const submit = document.createElement("button");
  submit.textContent = "Submit Group";
  submit.onclick = submitConnections;
  game.appendChild(submit);
}

function toggleTile(tile) {
  if (tile.classList.contains("solved")) return;
  tile.classList.toggle("selected");
  selectedTiles = [...document.querySelectorAll(".selected")];
  if (selectedTiles.length > 4) selectedTiles[0].classList.remove("selected");
}

function submitConnections() {
  if (selectedTiles.length !== 4) return;

  const attempt = selectedTiles.map(t => t.textContent);
  const match = connectionsSolutions.find(g =>
    attempt.every(w => g.includes(w))
  );

  if (match) {
    selectedTiles.forEach(t => {
      t.classList.remove("selected");
      t.classList.add("solved");
      t.onclick = null;
    });
    message.textContent = "✅ Correct group!";
  } else {
    selectedTiles.forEach(t => t.classList.remove("selected"));
    message.textContent = "❌ Not a group";
  }

  selectedTiles = [];
}

/* ================= RESET ================= */

function newGame() {
  game.innerHTML = "";
  message.textContent = "Choose a game";
}
</script>

</body>
</html>
