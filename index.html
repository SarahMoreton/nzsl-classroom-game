<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Wordle + Connections</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 16px;
  margin: 6px;
  font-size: 16px;
  cursor: pointer;
}

h1 { margin-bottom: 8px; }

/* ---------- TILES ---------- */
.tile {
  border: 2px solid #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

/* ---------- WORDLE ---------- */
#wordleGrid { display: grid; gap: 8px; justify-content: center; }
.wordleRow { display: grid; gap: 6px; }

.wordleRow .tile {
  width: 50px;
  height: 50px;
  font-size: 22px;
}

/* Wordle colours */
.correct { background: #6aaa64; color: white; }
.wrong   { background: #c9b458; color: black; }
.incorrect { background: #000000; color: white; }

/* Wordle choices */
#choices {
  margin-top: 10px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.choiceBtn:disabled {
  opacity: 0.4;
  cursor: default;
}

/* ---------- CONNECTIONS ---------- */
.connectionsGrid {
  display: grid;
  grid-template-columns: repeat(4, 110px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.connectionsGrid .tile {
  height: 80px;
  cursor: pointer;
}

.selected { border: 3px solid blue; }
.solved   { background: #6aaa64; color: white; }

/* ---------- CONTROLS ---------- */
#lengthSelect {
  margin: 8px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>NZSL Wordle + Connections</h1>

<!-- MAIN MENU -->
<button onclick="startWordle()">Wordle</button>
<button onclick="startConnections()">Connections</button>
<button onclick="restartGame()">Restart</button>

<h3 id="message"></h3>
<div id="controls"></div>
<div id="game"></div>

<script>
/* =========================
   WORD LIST (≤ 5 LETTERS)
========================= */
const WORDS = [
"DOG","CAT","COW","PIG","BIRD","FISH",
"MUM","DAD","BOY","GIRL",
"RUN","WALK","JUMP","SIT",
"HAPPY","SAD","CALM","ANGRY",
"APPLE","PEAR","MILK","CAKE",
"CAR","BUS","BIKE","TRAIN",
"SUN","RAIN","WIND","COLD",
"BOOK","BAG","HAT","COAT",
"OPEN","CLOSE","STOP","GO"
];

/* =========================
   WORDLE STATE
========================= */
let answer = "";
let options = [];
let row = 0;

/* =========================
   CONNECTION GROUPS
========================= */
const CONNECTION_GROUPS = [
  ["DOG","CAT","COW","PIG"],
  ["RUN","WALK","JUMP","SIT"],
  ["MUM","DAD","BOY","GIRL"],
  ["SUN","RAIN","WIND","COLD"]
];

/* =========================
   WORDLE SETUP
========================= */
function startWordle() {
  document.getElementById("controls").innerHTML = `
    <label><strong>Word length:</strong></label>
    <select id="lengthSelect">
      <option value="3">3 letters</option>
      <option value="4">4 letters</option>
      <option value="5" selected>5 letters</option>
    </select>
    <br>
    <button onclick="newWordle(false)">New Wordle</button>
    <button onclick="newWordle(true)">Daily Wordle</button>
  `;
  document.getElementById("game").innerHTML = "";
  message.textContent = "Choose New or Daily Wordle";
}

function newWordle(daily) {
  const len = Number(document.getElementById("lengthSelect").value);
  row = 0;

  const pool = WORDS.filter(w => w.length === len);
  const seed = daily ? Math.floor(Date.now() / 86400000) : Math.random();

  options = [...pool].sort(() => seed - 0.5).slice(0, 6);
  answer = options[seed * options.length | 0];

  buildWordleGrid(len);
  showWordleChoices();
  message.textContent = "Choose from the word list";
}

function buildWordleGrid(len) {
  const game = document.getElementById("game");
  game.innerHTML = "";

  const grid = document.createElement("div");
  grid.id = "wordleGrid";

  for (let r = 0; r < 6; r++) {
    const rowDiv = document.createElement("div");
    rowDiv.className = "wordleRow";
    rowDiv.style.gridTemplateColumns = `repeat(${len}, 50px)`;
    for (let i = 0; i < len; i++) {
      rowDiv.appendChild(document.createElement("div")).className = "tile";
    }
    grid.appendChild(rowDiv);
  }
  game.appendChild(grid);
}

function showWordleChoices() {
  const game = document.getElementById("game");
  const div = document.createElement("div");
  div.id = "choices";

  options.forEach(w => {
    const b = document.createElement("button");
    b.textContent = w;
    b.className = "choiceBtn";
    b.onclick = () => {
      b.disabled = true;
      submitGuess(w);
    };
    div.appendChild(b);
  });

  game.appendChild(div);
}

/* =========================
   WORDLE LOGIC
========================= */
function submitGuess(word) {
  if (row >= 6) return;

  const tiles = document.getElementById("wordleGrid").children[row].children;
  const counts = {};

  for (const c of answer) counts[c] = (counts[c] || 0) + 1;

  for (let i = 0; i < answer.length; i++) {
    tiles[i].textContent = word[i];
    if (word[i] === answer[i]) {
      tiles[i].classList.add("correct");
      counts[word[i]]--;
    }
  }

  for (let i = 0; i < answer.length; i++) {
    if (!tiles[i].classList.contains("correct")) {
      if (counts[word[i]] > 0) {
        tiles[i].classList.add("wrong");
        counts[word[i]]--;
      } else {
        tiles[i].classList.add("incorrect");
      }
    }
  }

  if (word === answer) {
    message.textContent = "Correct! 🎉";
    row = 6;
    return;
  }

  row++;
}

/* =========================
   CONNECTIONS
========================= */
function startConnections() {
  document.getElementById("controls").innerHTML = "";
  const game = document.getElementById("game");
  game.innerHTML = "";
  message.textContent = "Select 4 words that belong together";

  const allWords = CONNECTION_GROUPS.flat().sort(() => Math.random() - 0.5);
  const grid = document.createElement("div");
  grid.className = "connectionsGrid";

  allWords.forEach(word => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = word;
    tile.onclick = () => {
      tile.classList.toggle("selected");
      checkConnections();
    };
    grid.appendChild(tile);
  });

  game.appendChild(grid);
}

function checkConnections() {
  const selected = [...document.querySelectorAll(".tile.selected")];
  if (selected.length !== 4) return;

  const words = selected.map(t => t.textContent);
  const match = CONNECTION_GROUPS.find(g =>
    words.every(w => g.includes(w))
  );

  if (match) {
    selected.forEach(t => {
      t.classList.remove("selected");
      t.classList.add("solved");
      t.onclick = null;
    });
    message.textContent = "Correct group!";
  } else {
    selected.forEach(t => t.classList.remove("selected"));
    message.textContent = "Try again";
  }
}

/* =========================
   RESTART
========================= */
function restartGame() {
  document.getElementById("game").innerHTML = "";
  document.getElementById("controls").innerHTML = "";
  message.textContent = "Choose a game";
}
</script>

</body>
</html>
