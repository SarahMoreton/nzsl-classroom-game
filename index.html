<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Wordle</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 16px;
  margin: 6px;
  font-size: 16px;
  cursor: pointer;
}

h1 { margin-bottom: 10px; }

/* ---------- TILES ---------- */
.tile {
  border: 2px solid #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

/* ---------- WORDLE GRID ---------- */
#wordleGrid {
  display: grid;
  gap: 8px;
  justify-content: center;
  margin-top: 20px;
}

.wordleRow {
  display: grid;
  gap: 6px;
}

.wordleRow .tile {
  width: 50px;
  height: 50px;
  font-size: 22px;
}

/* ---------- COLOURS ---------- */
.correct   { background: #6aaa64; color: white; }
.wrong     { background: #c9b458; color: black; }
.incorrect { background: #000; color: white; }

/* ---------- CHOICES ---------- */
#choices {
  margin-top: 16px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.choiceBtn:disabled {
  opacity: 0.4;
  cursor: default;
}
</style>
</head>

<body>

<h1>NZSL Wordle</h1>

<button onclick="showMenu()">New Wordle</button>

<h3 id="message"></h3>
<div id="controls"></div>
<div id="game"></div>

<script>
/* =========================
   WORD LIST
   (simple, visual words)
========================= */
const WORDS = [
  "DOG","CAT","COW","PIG","BIRD","FISH",
  "RUN","WALK","JUMP","SIT",
  "MUM","DAD","BOY","GIRL",
  "SUN","RAIN","WIND","COLD",
  "APPLE","PEAR","MILK","CAKE",
  "CAR","BUS","BIKE","TRAIN",
  "BOOK","BAG","HAT","COAT"
];

/* =========================
   STATE
========================= */
let answer = "";
let options = [];
let row = 0;

/* =========================
   MENU
========================= */
function showMenu() {
  controls.innerHTML = `
    <label><strong>Word length:</strong></label>
    <select id="lengthSelect">
      <option value="3">3 letters</option>
      <option value="4">4 letters</option>
      <option value="5" selected>5 letters</option>
    </select><br><br>
    <button onclick="startWordle()">Start Wordle</button>
  `;
  game.innerHTML = "";
  message.textContent = "Choose word length";
}

/* =========================
   PICK 6 DISTINCT WORDS
   (no shared last letters)
========================= */
function pickDistinctWords(pool, count) {
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const chosen = [];
  const usedEndings = new Set();

  for (const word of shuffled) {
    const ending = word.slice(-1);
    if (!usedEndings.has(ending)) {
      chosen.push(word);
      usedEndings.add(ending);
    }
    if (chosen.length === count) break;
  }

  return chosen;
}

/* =========================
   START WORDLE
========================= */
function startWordle() {
  row = 0;
  game.innerHTML = "";

  const len = Number(lengthSelect.value);
  const pool = WORDS.filter(w => w.length === len);

  options = pickDistinctWords(pool, 6);
  answer = options[Math.floor(Math.random() * options.length)];

  buildGrid(len);
  showChoices();

  message.textContent = "Choose a word";
}

/* =========================
   BUILD GRID
========================= */
function buildGrid(len) {
  const grid = document.createElement("div");
  grid.id = "wordleGrid";

  for (let r = 0; r < 6; r++) {
    const rowDiv = document.createElement("div");
    rowDiv.className = "wordleRow";
    rowDiv.style.gridTemplateColumns = `repeat(${len}, 50px)`;

    for (let i = 0; i < len; i++) {
      rowDiv.appendChild(document.createElement("div")).className = "tile";
    }
    grid.appendChild(rowDiv);
  }

  game.appendChild(grid);
}

/* =========================
   SHOW CHOICES
========================= */
function showChoices() {
  const div = document.createElement("div");
  div.id = "choices";

  options.forEach(word => {
    const b = document.createElement("button");
    b.textContent = word;
    b.className = "choiceBtn";
    b.onclick = () => {
      b.disabled = true;
      submitGuess(word);
    };
    div.appendChild(b);
  });

  game.appendChild(div);
}

/* =========================
   WORDLE LOGIC
========================= */
function submitGuess(word) {
  const tiles = wordleGrid.children[row].children;
  const counts = {};

  for (const c of answer) counts[c] = (counts[c] || 0) + 1;

  // correct letters
  for (let i = 0; i < answer.length; i++) {
    tiles[i].textContent = word[i];
    if (word[i] === answer[i]) {
      tiles[i].classList.add("correct");
      counts[word[i]]--;
    }
  }

  // misplaced / incorrect
  for (let i = 0; i < answer.length; i++) {
    if (tiles[i].classList.contains("correct")) continue;
    if (counts[word[i]] > 0) {
      tiles[i].classList.add("wrong");
      counts[word[i]]--;
    } else {
      tiles[i].classList.add("incorrect");
    }
  }

  if (word === answer) {
    message.textContent = "✅ Correct!";
    disableChoices();
    return;
  }

  row++;

  if (row === 6) {
    message.textContent = `❌ The word was ${answer}`;
    disableChoices();
  }
}

/* =========================
   DISABLE BUTTONS
========================= */
function disableChoices() {
  document.querySelectorAll(".choiceBtn")
    .forEach(b => b.disabled = true);
}

/* Start with menu */
showMenu();
</script>

</body>
</html>
