<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Wordle</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 16px;
  margin: 6px;
  font-size: 16px;
  cursor: pointer;
}

h1 {
  margin-bottom: 10px;
}

.tile {
  border: 2px solid #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

/* WORDLE GRID */
#wordleGrid {
  display: grid;
  gap: 8px;
  justify-content: center;
}

.wordleRow {
  display: grid;
  gap: 6px;
}

.wordleRow .tile {
  width: 50px;
  height: 50px;
  font-size: 22px;
}

/* WORDLE COLOURS (EXACT) */
.correct {
  background-color: #6aaa64; /* green */
  color: white;
}

.wrong {
  background-color: #c9b458; /* yellow */
  color: black;
}

.incorrect {
  background-color: #000000; /* black */
  color: white;
}

/* ANSWER BUTTONS */
#choices {
  margin-top: 15px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.choiceBtn {
  padding: 10px 16px;
  font-size: 16px;
}

/* WORD LENGTH SELECT */
#lengthSelect {
  margin: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>NZSL Wordle</h1>

<label>
  <strong>Word length:</strong>
  <select id="lengthSelect">
    <option value="3">3 letters</option>
    <option value="4">4 letters</option>
    <option value="5" selected>5 letters</option>
  </select>
</label>

<br>

<button onclick="startDaily()">Daily Wordle</button>
<button onclick="startNew()">New Wordle</button>
<button onclick="restartGame()">Restart</button>

<h3 id="message"></h3>
<div id="game"></div>

<script>
/* =========================
   WORD LIST (≤5 LETTERS)
========================= */
const WORDS = [
"DOG","CAT","COW","PIG","BIRD","FISH",
"RUN","WALK","JUMP","SIT","STAND","LOOK",
"MUM","DAD","BOY","GIRL","BABY",
"HAPPY","SAD","TIRED","CALM","ANGRY",
"APPLE","PEAR","BREAD","MILK","WATER","CAKE",
"HOUSE","SCHOOL","PARK","ROAD","CHAIR","TABLE",
"BOOK","BAG","HAT","COAT","SHOE",
"CAR","BUS","TRAIN","BIKE",
"SUN","RAIN","COLD","WIND","HOT",
"PLAY","READ","WRITE","HELP","WAIT",
"OPEN","CLOSE","STOP","GO","COME","GIVE"
];

/* =========================
   GAME STATE
========================= */
let answer = "";
let options = [];
let row = 0;

/* =========================
   WORD SELECTION
========================= */
function getWordsByLength(len) {
  return WORDS.filter(w => w.length === len);
}

function pickSixWords(len, seed = null) {
  let pool = getWordsByLength(len);
  let list = [...pool];

  if (seed !== null) {
    for (let i = list.length - 1; i > 0; i--) {
      seed = (seed * 9301 + 49297) % 233280;
      const j = seed % (i + 1);
      [list[i], list[j]] = [list[j], list[i]];
    }
  } else {
    list.sort(() => Math.random() - 0.5);
  }

  return list.slice(0, 6);
}

/* =========================
   BUILD WORDLE
========================= */
function buildWordle(len, daily) {
  row = 0;
  const seed = daily ? Math.floor(Date.now() / 86400000) : null;

  options = pickSixWords(len, seed);
  answer = options[Math.floor(Math.random() * options.length)];

  const game = document.getElementById("game");
  game.innerHTML = "";

  const grid = document.createElement("div");
  grid.id = "wordleGrid";

  for (let r = 0; r < 6; r++) {
    const rowDiv = document.createElement("div");
    rowDiv.className = "wordleRow";
    rowDiv.style.gridTemplateColumns = `repeat(${len}, 50px)`;

    for (let i = 0; i < len; i++) {
      rowDiv.appendChild(document.createElement("div")).className = "tile";
    }
    grid.appendChild(rowDiv);
  }

  game.appendChild(grid);

  const choicesDiv = document.createElement("div");
  choicesDiv.id = "choices";

  options.forEach(word => {
    const btn = document.createElement("button");
    btn.className = "choiceBtn";
    btn.textContent = word;
    btn.onclick = () => submitGuess(word);
    choicesDiv.appendChild(btn);
  });

  game.appendChild(choicesDiv);
  message.textContent = "Choose a word";
}

/* =========================
   START BUTTONS
========================= */
function startNew() {
  const len = Number(document.getElementById("lengthSelect").value);
  buildWordle(len, false);
}

function startDaily() {
  const len = Number(document.getElementById("lengthSelect").value);
  buildWordle(len, true);
}

function restartGame() {
  document.getElementById("game").innerHTML = "";
  message.textContent = "";
}

/* =========================
   GUESS LOGIC
========================= */
function submitGuess(word) {
  if (row >= 6) return;

  const grid = document.getElementById("wordleGrid");
  const tiles = grid.children[row].children;
  const count = {};

  for (const c of answer) count[c] = (count[c] || 0) + 1;

  for (let i = 0; i < answer.length; i++) {
    tiles[i].textContent = word[i];
    if (word[i] === answer[i]) {
      tiles[i].classList.add("correct");
      count[word[i]]--;
    }
  }

  for (let i = 0; i < answer.length; i++) {
    if (!tiles[i].classList.contains("correct")) {
      if (count[word[i]] > 0) {
        tiles[i].classList.add("wrong");
        count[word[i]]--;
      } else {
        tiles[i].classList.add("incorrect");
      }
    }
  }

  if (word === answer) {
    message.textContent = "Correct! 🎉";
    row = 6;
    return;
  }

  row++;
}
</script>

</body>
</html>
