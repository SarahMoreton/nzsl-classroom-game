<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NZSL Connections + Wordle</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f4f4;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

/* ---- CONNECTIONS ---- */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 120px);
  gap: 10px;
  justify-content: center;
  margin: 20px;
}
.tile {
  width: 120px;
  height: 120px;
  border: 3px solid #333;
  border-radius: 10px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.selected { border-color: blue; }
.correct { background:#6aaa64; color:white; }
.wrong { background:#787c7e; color:white; }

/* ---- WORDLE ---- */
#grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}
#grid .tile {
  width: 50px;
  height: 50px;
  font-size: 24px;
}
.present { background:#c9b458; }
</style>
</head>

<body>
.correct {
  background: #6aaa64; /* green */
  color: white;
}

.present {
  background: #c9b458; /* yellow */
  color: black;
}

.wrong {
  background: #787c7e; /* black/grey */
  color: white;
}

<h1>NZSL Classroom Game</h1>

<button onclick="startConnections()">Connections</button>
<button onclick="startWordleMenu()">Wordle</button>

<!-- Wordle mode buttons -->
<div id="wordleMenu" style="display:none;">
  <button onclick="startWordleMenu()">🔁 Teacher Reset</button>
</div>


 

<button id="newConnectionsBtn" 
  onclick="startConnections()">🔁 New Connections</button>
<h3 id="message"></h3>
<div id="wordleChoices"></div>
 <div id="connectionsGame"></div>
<div id="connectionsControls">
  <button id="submitConnectionsBtn"
          onclick="checkSelections()"
          style="display:none;">
    Submit Connections
  </button>
</div>
<div id="wordleGame"></div>
  
<script>
  /* =====================================================
   WORDLE DATA (LARGER SET)
===================================================== */
  const WORDLE_WORDS = {
  3: [
    "DOG","CAT","COW","PIG","RAT","OWL","BAT","ANT",
    "RUN","EAT","SIT","HOP","ARM","LEG","EYE","EAR"
  ],

  4: [
    "FISH","BIRD","MILK","CAKE","READ","PLAY","WALK",
    "JUMP","LOOK","HELP","HAND","FOOT","NOSE","BACK"
  ],

  5: [
    "BREAD","APPLE","HAPPY","ANGRY","TIRED","SMILE",
    "WATER","TABLE","CHAIR","SHOES","COAST","PLANT"
  ]
};

  function getTodaySeed() {
  const today = new Date();
  return today.getFullYear() + "-" +
         (today.getMonth() + 1) + "-" +
         today.getDate();
}
  function getDailyWordle() {
  const seed = getTodaySeed();

  // Simple deterministic hash
  let hash = 0;
  for (let i = 0; i < seed.length; i++) {
    hash = seed.charCodeAt(i) + ((hash << 5) - hash);
  }

  const lengths = Object.keys(WORDLE_WORDS);
  const length = lengths[Math.abs(hash) % lengths.length];

  const words = WORDLE_WORDS[length];
  const answer = words[Math.abs(hash) % words.length];

  return { length: Number(length), answer };
}

  let currentLength = 5;
function startWordleMenu() {
  const daily = getDailyWordle();
  startWordle(daily.length, daily.answer);
}

/* =====================================================
   GLOBAL WORDLE STATE
===================================================== */
let answer = "DOG";        // change this word whenever you want
let attempt = 0;
let currentGuess = "";

/* =====================================================
   NZSL CONNECTIONS DATA (LARGE SET)
===================================================== */
const NZSL_TOPICS = {
  Animals: [
    "DOG","CAT","COW","PIG","HORSE","SHEEP","GOAT","DUCK","CHICKEN",
    "FISH","SHARK","WHALE","DOLPHIN","BIRD","OWL","EAGLE","RABBIT",
    "MOUSE","RAT","LION","TIGER","BEAR"
  ],
  Food: [
    "BREAD","RICE","MILK","CHEESE","APPLE","PEAR","BANANA","ORANGE",
    "MEAT","FISH","EGGS","PASTA","SOUP","CAKE","BISCUIT","CHIPS",
    "HONEY","BUTTER","YOGURT","WATER"
  ],
  Feelings: [
    "HAPPY","SAD","ANGRY","CALM","EXCITED","TIRED","SCARED","PROUD",
    "WORRIED","BORED","SURPRISED","CONFUSED","RELAXED","SAFE","SORRY"
  ],
  Actions: [
    "RUN","WALK","JUMP","SIT","STAND","READ","WRITE","LOOK","LISTEN",
    "PLAY","EAT","DRINK","HELP","CARRY","OPEN","CLOSE","WAIT"
  ],
  People: [
    "MUM","DAD","BOY","GIRL","TEACHER","FRIEND","BABY","DOCTOR",
    "NURSE","POLICE","WORKER","HELPER"
  ]
};

const WORD_TO_TOPIC = {};
Object.keys(NZSL_TOPICS).forEach(topic =>
  NZSL_TOPICS[topic].forEach(word => WORD_TO_TOPIC[word] = topic)
);

/* =====================================================
   CONNECTIONS GAME
===================================================== */
function startConnections() {
  document.getElementById("newConnectionsBtn").style.display = "inline-block";
  document.getElementById("wordleMenu").style.display = "none";
  document.getElementById("submitConnectionsBtn").style.display = "inline-block";

  document.getElementById("wordleGame").innerHTML = "";
  document.getElementById("wordleChoices").textContent = "";

  currentGuess = "";
  
  attempt = 0;

  const game = document.getElementById("connectionsGame");
  game.innerHTML = "";

  const topics = Object.keys(NZSL_TOPICS)
    .sort(() => Math.random() - 0.5)
    .slice(0, 4);

  const words = topics
    .flatMap(t =>
      NZSL_TOPICS[t].sort(() => Math.random() - 0.5).slice(0, 4)
    )
    .sort(() => Math.random() - 0.5);

  const grid = document.createElement("div");
  grid.className = "grid";

  words.forEach(w => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = w;
    tile.onclick = () => tile.classList.toggle("selected");
    grid.appendChild(tile);
  });

  game.appendChild(grid);
  document.getElementById("message").textContent =
    "Select 4 words that belong together";
}

function getRandomAnswer() {
  const lengths = Object.keys(WORDLE_WORDS);          // ["3","4","5"]
  const length = lengths[Math.floor(Math.random() * lengths.length)];
  const words = WORDLE_WORDS[length];
  return words[Math.floor(Math.random() * words.length)];
}

/* =====================================================
   WORDLE GAME
===================================================== */
function startWordle(length, dailyAnswer) {
  document.getElementById("newConnectionsBtn").style.display = "none";
  document.getElementById("submitConnectionsBtn").style.display = "none";
  document.getElementById("wordleMenu").style.display = "block";
  document.getElementById("connectionsGame").innerHTML = "";
  const game = document.getElementById("wordleGame");
  game.innerHTML = "";

  answer = dailyAnswer;
  attempt = 0;
  currentGuess = "";

 // Daily hint list (includes the answer)
const previewCount = 6;
const shuffled = [...WORDLE_WORDS[length]].sort(() => Math.random() - 0.5);

document.getElementById("wordleChoices").textContent =
  `Possible answers: ${shuffled.slice(0, previewCount).join(", ")}`;

  // Build grid
  const grid = document.createElement("div");
  grid.id = "grid";

  for (let i = 0; i < 6; i++) {
    const row = document.createElement("div");
    row.style.display = "flex";

    for (let j = 0; j < answer.length; j++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      row.appendChild(tile);
    }
    grid.appendChild(row);
  }

  game.appendChild(grid);
  document.getElementById("message").textContent =
    "Wordle: type letters and press Enter";
}

document.addEventListener("keydown", e => {
  const grid = document.getElementById("grid");
  if (!grid) return;
  if (attempt >= 6) return;

  const row = grid.children[attempt];
  if (!row) return;

  if (e.key === "Backspace") {
    currentGuess = currentGuess.slice(0, -1);
  }
 else if (e.key === "Enter") {
  if (currentGuess.length !== answer.length) return;

  submitGuess(currentGuess);

  // ✅ move off this row so it’s never rewritten
  attempt++;

  currentGuess = "";
  return;
};

  else if (/^[A-Za-z]$/.test(e.key) && currentGuess.length < answer.length) {
    currentGuess += e.key.toUpperCase();
  }

  for (let i = 0; i < answer.length; i++) {
    row.children[i].textContent = currentGuess[i] || "";
  }
});

  function submitGuess(word) {
  const row = document.getElementById("grid").children[attempt];
  const answerLetters = answer.split("");
  const guessLetters = word.split("");

  // Track counts of letters in the answer
  const letterCounts = {};
  answerLetters.forEach(l => {
    letterCounts[l] = (letterCounts[l] || 0) + 1;
  });

  // FIRST PASS: correct letters in correct position (GREEN)
  for (let i = 0; i < guessLetters.length; i++) {
    const tile = row.children[i];
    tile.textContent = guessLetters[i];

    if (guessLetters[i] === answerLetters[i]) {
      tile.classList.add("correct");
      letterCounts[guessLetters[i]]--;
      guessLetters[i] = null; // mark as used
    }
  }

  // SECOND PASS: correct letters in wrong position (YELLOW) or wrong (BLACK)
  for (let i = 0; i < guessLetters.length; i++) {
    if (guessLetters[i] === null) continue;

    const tile = row.children[i];

    if (letterCounts[guessLetters[i]] > 0) {
      tile.classList.add("present"); // yellow
      letterCounts[guessLetters[i]]--;
    } else {
      tile.classList.add("wrong"); // black/grey
    }
  }

  // ✅ Win check
  if (word === answer) {
    document.getElementById("message").textContent = "🎉 Solved!";
    attempt = 6; // lock the game
    return;
  }

  attempt++; // move to next row
}



/* START */

  function checkSelections() {
  const selected = [...document.querySelectorAll(".tile.selected")];
  if (selected.length !== 4) {
    document.getElementById("message").textContent =
      "Select exactly 4 tiles";
    return;
  }

  const topics = selected.map(t => WORD_TO_TOPIC[t.textContent]);
  const correct = topics.every(t => t === topics[0]);

  if (correct) {
    selected.forEach(t => {
      t.classList.remove("selected");
      t.classList.add("correct");
      t.onclick = null;
    });
    document.getElementById("message").textContent = "✅ Correct group!";
  } else {
    selected.forEach(t => {
      t.classList.add("wrong");
      setTimeout(() => t.classList.remove("wrong"), 600);
      t.classList.remove("selected");
    });
    document.getElementById("message").textContent = "❌ Try again";
  }
}

 document.addEventListener("DOMContentLoaded", () => {
  startConnections();
});
</script>

</body>
</html>
