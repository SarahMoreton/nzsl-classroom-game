<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Connections + Wordle</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 20px;
}

button {
  padding: 10px 14px;
  margin: 6px;
  font-size: 14px;
  cursor: pointer;
}

/* TILE */
.tile {
  border: 2px solid #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CONNECTIONS */
.connectionsGrid {
  display: grid;
  grid-template-columns: repeat(4, 100px);
  gap: 8px;
  justify-content: center;
  margin-top: 20px;
}

.connectionsGrid .tile {
  width: 100px;
  height: 100px;
}

.selected { border: 3px solid blue; }
.solved { background: #6aaa64; color: white; }

/* WORDLE */
#wordleGrid { display: grid; gap: 8px; justify-content: center; }
.wordleRow { display: grid; gap: 6px; }

.wordleRow .tile {
  width: 50px;
  height: 50px;
  font-size: 22px;
}

/* WORDLE COLOURS */
.correct { background: #6aaa64; color: white; }
.wrong { background: #c9b458; color: black; }
.incorrect { background: black; color: white; }

#possibleWords {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>NZSL Connections + Wordle</h1>

<button onclick="startConnections()">Connections</button>
<button onclick="startDaily()">Daily Wordle</button>
<button onclick="startNew()">New Wordle</button>
<button onclick="toggleChoices()">Show / Hide Choices</button>

<h3 id="message"></h3>
<div id="game"></div>

<script>
/* WORD LIST (<=5 letters only) */
const WORDS = [
  "DOG","CAT","COW","PIG","GOAT","DUCK","BIRD","FISH",
  "APPLE","PEAR","BREAD","RICE","MILK","WATER","EGGS","SOUP","CAKE",
  "HONEY","CHIPS","HAPPY","SAD","ANGRY","CALM","TIRED","SAFE",
  "RUN","WALK","JUMP","SIT","READ","WRITE","LOOK","PLAY","EAT",
  "DRINK","HELP","OPEN","CLOSE","WAIT",
  "MUM","DAD","BOY","GIRL","BABY","FRIEND",
  "CHAIR","TABLE","HOUSE","SCHOOL","PARK","ROAD","CAR","BUS","BOOK",
  "BAG","HAT","COAT"
];

/* CONNECTIONS */
function startConnections() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  const shuffled = [...WORDS].sort(() => Math.random() - 0.5);
  const groups = [
    shuffled.slice(0,4),
    shuffled.slice(4,8),
    shuffled.slice(8,12),
    shuffled.slice(12,16)
  ];

  const grid = document.createElement("div");
  grid.className = "connectionsGrid";

  groups.flat().sort(() => Math.random()-0.5).forEach(word => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = word;
    tile.onclick = () => {
      tile.classList.toggle("selected");
      checkConnections(groups);
    };
    grid.appendChild(tile);
  });

  game.appendChild(grid);
  message.textContent = "Select 4 related words";
}

function checkConnections(groups) {
  const selected = [...document.querySelectorAll(".tile.selected")];
  if (selected.length !== 4) return;

  const words = selected.map(t => t.textContent);
  const match = groups.find(g => words.every(w => g.includes(w)));

  if (match) {
    selected.forEach(t => {
      t.classList.remove("selected");
      t.classList.add("solved");
      t.onclick = null;
    });
    message.textContent = "Correct group!";
  } else {
    selected.forEach(t => t.classList.remove("selected"));
    message.textContent = "Try again";
  }
}

/* WORDLE */
let answer="", guess="", row=0;

function dailyWord() {
  let h = 0;
  for (const c of new Date().toDateString()) h += c.charCodeAt(0);
  return WORDS[h % WORDS.length];
}

function buildWordle(word) {
  answer = word.toUpperCase();
  guess=""; row=0;

  const game = document.getElementById("game");
  game.innerHTML = "";

  const grid = document.createElement("div");
  grid.id = "wordleGrid";

  for (let r=0; r<6; r++) {
    const rowDiv = document.createElement("div");
    rowDiv.className = "wordleRow";
    rowDiv.style.gridTemplateColumns = `repeat(${answer.length}, 50px)`;

    for (let i=0; i<answer.length; i++) {
      rowDiv.appendChild(document.createElement("div")).className="tile";
    }
    grid.appendChild(rowDiv);
  }

  game.appendChild(grid);

  const options = [answer];
  while (options.length < 6) {
    const w = WORDS[Math.floor(Math.random()*WORDS.length)];
    if (!options.includes(w)) options.push(w);
  }

  const list = document.createElement("div");
  list.id = "possibleWords";
  list.textContent = "Choices: " + options.join(", ");
  game.appendChild(list);

  message.textContent = "Type and press Enter";
}

function startDaily(){ buildWordle(dailyWord()); }
function startNew(){ buildWordle(WORDS[Math.floor(Math.random()*WORDS.length)]); }

document.addEventListener("keydown", e => {
  const grid = document.getElementById("wordleGrid");
  if (!grid || row >= 6) return;

  const tiles = grid.children[row].children;

  if (e.key === "Backspace") guess = guess.slice(0,-1);
  else if (e.key === "Enter") {
    if (guess.length === answer.length) submitWordle(tiles);
    return;
  }
  else if (/^[A-Za-z]$/.test(e.key) && guess.length < answer.length)
    guess += e.key.toUpperCase();

  for (let i=0;i<answer.length;i++)
    tiles[i].textContent = guess[i] || "";
});

function submitWordle(tiles) {
  const count = {};
  for (const c of answer) count[c]=(count[c]||0)+1;

  for (let i=0;i<answer.length;i++)
    if (guess[i]===answer[i]) {
      tiles[i].classList.add("correct");
      count[guess[i]]--;
    }

  for (let i=0;i<answer.length;i++)
    if (!tiles[i].classList.contains("correct"))
      count[guess[i]]>0
        ? (tiles[i].classList.add("wrong"), count[guess[i]]--)
        : tiles[i].classList.add("incorrect");

  guess=""; row++;
}

function toggleChoices(){
  const d=document.getElementById("possibleWords");
  d.style.display = d.style.display==="none" ? "block":"none";
}
</script>

</body>
</html>
