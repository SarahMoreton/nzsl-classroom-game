<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NZSL Connections + Wordle</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f4f4;
  margin: 0;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 120px);
  gap: 10px;
  justify-content: center;
  margin: 20px auto;
}

.tile {
  width: 120px;
  height: 120px;
  border: 3px solid #333;
  border-radius: 10px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

.selected { border-color: blue; }
.correct { background:#6aaa64; color:white; }
.present { background:#c9b458; }
.wrong { background:#787c7e; color:white; }

#grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}
#grid .tile {
  width: 50px;
  height: 50px;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>NZSL Classroom Game</h1>

<button onclick="startConnections()">Connections</button>
<button onclick="startWordle()">Wordle</button>

<h3 id="message"></h3>
<div id="wordleChoices"></div>

<div id="connectionsGame"></div>
<div id="wordleGame"></div>

<button onclick="checkSelections()">Submit Connections</button>
