<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Connections + Wordle</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 { margin-top: 0; }

button, select {
  padding: 10px 14px;
  margin: 6px;
  cursor: pointer;
  font-size: 14px;
}

/* ---------- TILE BASE ---------- */
.tile {
  border: 3px solid #333;
  border-radius: 8px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

/* ---------- CONNECTIONS ---------- */
.connectionsGrid {
  display: grid;
  grid-template-columns: repeat(4, 120px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.connectionsGrid .tile {
  width: 120px;
  height: 120px;
  background: white;
  font-size: 16px;
}

.selected {
  border-color: #2563eb;
}

.solved {
  background: #6aaa64;
  color: white;
  border-color: #6aaa64;
}

/* ---------- WORDLE ---------- */
#wordleGrid {
  display: grid;
  gap: 6px;
  justify-content: center;
  margin-top: 20px;
}

#wordleGrid .tile {
  width: 50px;
  height: 50px;
  font-size: 24px;
  background: white;
}

/* ---------- WORDLE COLOURS ---------- */
.correct {
  background: #6aaa64;
  color: white;
}

.present {
  background: #c9b458;
  color: black;
}

.wrong {
  background: #787c7e;
  color: white;
}
</style>
</head>

<body>

<h1>NZSL Connections + Wordle</h1>

<label>
  Level:
  <select id="levelSelect">
    <option value="1">Year 1</option>
    <option value="2">Year 2</option>
    <option value="3">Year 3</option>
    <option value="4">Year 4</option>
    <option value="5">Year 5</option>
    <option value="6">Year 6</option>
    <option value="7">Year 7</option>
    <option value="8">Year 8</option>
    <option value="9">Year 9</option>
    <option value="10">Year 10</option>
  </select>
</label>

<br>

<button onclick="startConnections()">Connections</button>
<button onclick="startWordle()">Wordle</button>
<button onclick="revealWord()">👩‍🏫 Reveal Word</button>

<h3 id="message"></h3>
<div id="game"></div>

<script>
/* =====================================================
   LARGE NZSL WORD BANK (WORDS ONLY)
===================================================== */
const NZSL_TOPICS = {
  Animals: [
    "DOG","CAT","COW","PIG","HORSE","SHEEP","GOAT","DUCK","CHICKEN",
    "FISH","SHARK","WHALE","DOLPHIN","BIRD","OWL","EAGLE","RABBIT",
    "MOUSE","RAT","LION","TIGER","BEAR"
  ],
  Food: [
    "BREAD","RICE","MILK","CHEESE","APPLE","PEAR","BANANA","ORANGE",
    "MEAT","FISH","EGGS","PASTA","SOUP","CAKE","BISCUIT","CHIPS",
    "HONEY","BUTTER","YOGURT","WATER"
  ],
  Feelings: [
    "HAPPY","SAD","ANGRY","CALM","EXCITED","TIRED","SCARED","PROUD",
    "WORRIED","BORED","SURPRISED","CONFUSED","RELAXED","SAFE","SORRY"
  ],
  Actions: [
    "RUN","WALK","JUMP","SIT","STAND","READ","WRITE","LOOK","LISTEN",
    "PLAY","EAT","DRINK","HELP","CARRY","OPEN","CLOSE","WAIT"
  ],
  People: [
    "MUM","DAD","BOY","GIRL","TEACHER","FRIEND","BABY","DOCTOR",
    "NURSE","POLICE","WORKER","HELPER"
  ]
};

/* =====================================================
   YEAR 1–10 WORD FILTERS (BY LENGTH)
===================================================== */
const LEVEL_FILTERS = {
  1: w => w.length <= 3,
  2: w => w.length === 3,
  3: w => w.length <= 4,
  4: w => w.length === 4,
  5: w => w.length <= 5,
  6: w => w.length === 5,
  7: w => w.length <= 6,
  8: w => w.length === 6,
  9: w => w.length <= 7,
  10: w => w.length >= 7
};

/* =====================================================
   CONNECTIONS (AUTO‑CHECK)
===================================================== */
let remainingGroups = 0;

function startConnections() {
  const level = levelSelect.value;
  const filter = LEVEL_FILTERS[level];
  const game = document.getElementById("game");
  game.innerHTML = "";

  const topics = Object.keys(NZSL_TOPICS)
    .map(topic => ({
      topic,
      words: NZSL_TOPICS[topic].filter(filter).slice(0, 4)
    }))
    .filter(t => t.words.length === 4)
    .slice(0, 4);

  remainingGroups = topics.length;

  const allWords = topics.flatMap(t => t.words)
    .sort(() => Math.random() - 0.5);

  const grid = document.createElement("div");
  grid.className = "connectionsGrid";

  allWords.forEach(word => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = word;
    tile.onclick = () => {
      tile.classList.toggle("selected");
      autoCheckConnections(topics);
    };
    grid.appendChild(tile);
  });

  game.appendChild(grid);
  message.textContent = "Connections: select 4 matching words";
}

function autoCheckConnections(topics) {
  const selected = [...document.querySelectorAll(".tile.selected")];
  if (selected.length !== 4) return;

  const words = selected.map(t => t.textContent);
  const match = topics.find(t => words.every(w => t.words.includes(w)));

  if (match) {
    selected.forEach(t => {
      t.classList.remove("selected");
      t.classList.add("solved");
      t.onclick = null;
    });
    remainingGroups--;
    message.textContent =
      remainingGroups === 0 ? "🎉 All groups solved!" : "✅ Correct group";
  } else {
    selected.forEach(t => t.classList.remove("selected"));
    message.textContent = "❌ Try again";
  }
}

/* =====================================================
   DAILY WORDLE (SAME WORD BANK)
===================================================== */
let answer = "";
let guess = "";

function getDailyWord(list) {
  const today = new Date().toDateString();
  let hash = 0;
  for (let c of today) hash = c.charCodeAt(0) + ((hash << 5) - hash);
  return list[Math.abs(hash) % list.length];
}

function startWordle() {
  const level = levelSelect.value;
  const filter = LEVEL_FILTERS[level];

  const allWords = Object.values(NZSL_TOPICS)
    .flat()
    .filter(filter);

  answer = getDailyWord(allWords).toUpperCase();
  guess = "";

  const game = document.getElementById("game");
  game.innerHTML = "";

  const grid = document.createElement("div");
  grid.id = "wordleGrid";
  grid.style.gridTemplateColumns = `repeat(${answer.length}, 50px)`;

  for (let i = 0; i < answer.length; i++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    grid.appendChild(tile);
  }

  game.appendChild(grid);
  message.textContent = "Wordle: type and press Enter";
}

/* =====================================================
   WORDLE INPUT + CHECK
===================================================== */
document.addEventListener("keydown", e => {
  const grid = document.getElementById("wordleGrid");
  if (!grid) return;

  if (e.key === "Backspace") {
    guess = guess.slice(0, -1);
  }
  else if (e.key === "Enter") {
    if (guess.length === answer.length) checkWordle(grid);
    return;
  }
  else if (/^[a-zA-Z]$/.test(e.key) && guess.length < answer.length) {
    guess += e.key.toUpperCase();
  }

  for (let i = 0; i < answer.length; i++) {
    grid.children[i].textContent = guess[i] || "";
  }
});

function checkWordle(grid) {
  const counts = {};
  for (let c of answer) counts[c] = (counts[c] || 0) + 1;

  // Green first
  for (let i = 0; i < answer.length; i++) {
    if (guess[i] === answer[i]) {
      grid.children[i].classList.add("correct");
      counts[guess[i]]--;
    }
  }

  // Yellow / grey
  for (let i = 0; i < answer.length; i++) {
    if (grid.children[i].classList.contains("correct")) continue;
    if (counts[guess[i]] > 0) {
      grid.children[i].classList.add("present");
      counts[guess[i]]--;
    } else {
      grid.children[i].classList.add("wrong");
    }
  }

  message.textContent = guess === answer ? "🎉 Solved!" : "Try again";
}

/* =====================================================
   TEACHER REVEAL
===================================================== */
function revealWord() {
  if (!answer) return;
  message.textContent = `👩‍🏫 The word is: ${answer}`;
}
</script>

</body>
</html>
