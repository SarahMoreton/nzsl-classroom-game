<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NZSL Wordle + Connections</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 20px;
}

button {
  padding: 12px 16px;
  margin: 6px;
  font-size: 16px;
  cursor: pointer;
}

.tile {
  border: 2px solid #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

/* ---------- WORDLE ---------- */
#wordleGrid {
  display: grid;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}

.wordleRow {
  display: grid;
  gap: 6px;
}

.wordleRow .tile {
  width: 50px;
  height: 50px;
  font-size: 22px;
}

/* Colours */
.correct   { background: #6aaa64; color: white; }
.wrong     { background: #c9b458; color: black; }
.incorrect { background: #000; color: white; }

#choices {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 15px;
}

/* ---------- CONNECTIONS ---------- */
.connectionsGrid {
  display: grid;
  grid-template-columns: repeat(4, 120px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.selected { border: 3px solid blue; }
.solved   { background: #6aaa64; color: white; }
</style>
</head>

<body>

<h1>NZSL Wordle + Connections</h1>

<button onclick="startWordle()">Wordle</button>
<button onclick="startConnections()">Connections</button>
<button onclick="newGame()">New Game</button>

<h3 id="message"></h3>
<div id="game"></div>

<script>
/* =====================================================
   NZSL TOPIC WORD BANK
===================================================== */
const TOPICS = {
  animals:["DOG","CAT","COW","SHEEP","HORSE","PIG","GOAT","BIRD","FISH","FROG"],
  food:["APPLE","BREAD","CHEESE","MILK","WATER","JUICE","CAKE","RICE","PASTA","EGG"],
  people:["MUM","DAD","BABY","CHILD","BOY","GIRL","TEACHER","STUDENT","DOCTOR","FRIEND"],
  weather:["SUN","RAIN","WIND","SNOW","CLOUD","STORM","MOON","STAR","SKY","RIVER"],
  transport:["CAR","BUS","TRAIN","PLANE","TRUCK","BIKE","BOAT","SHIP","TAXI","VAN"],
  clothing:["HAT","COAT","SHIRT","PANTS","DRESS","SOCKS","SHOES","JACKET","SCARF","BELT"],
  house:["CHAIR","TABLE","BED","DOOR","WINDOW","CLOCK","PHONE","FRIDGE","SINK","BIN"],
  school:["BOOK","PENCIL","PEN","PAPER","BAG","DESK","CLASS","READ","WRITE","DRAW"],
  actions:["RUN","WALK","JUMP","SIT","STAND","EAT","DRINK","SLEEP","PLAY","STOP"],
  colours:["RED","BLUE","GREEN","YELLOW","BLACK","WHITE","BROWN","PINK","PURPLE","ORANGE"],
  body:["HEAD","EYES","EARS","NOSE","MOUTH","HAND","ARM","LEG","FOOT","BACK"],
  feelings:["HAPPY","SAD","ANGRY","TIRED","SCARED","CALM","BRAVE","PROUD","BORED","UPSET"]
};

const WORD_BANK = Object.values(TOPICS).flat();

/* =====================================================
   WORDLE LOGIC
===================================================== */
let wordleAnswer = "";
let wordleRow = 0;
let wordleGridEl = null;

function tooSimilar(a, b) {
  if (a.slice(-2) === b.slice(-2)) return true;
  let shared = 0;
  for (const c of a) if (b.includes(c)) shared++;
  return shared >= a.length - 1;
}

function pickWordleOptions(len) {
  const pool = WORD_BANK.filter(w => w.length === len);
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const chosen = [];

  for (const w of shuffled) {
    if (chosen.every(x => !tooSimilar(x, w))) chosen.push(w);
    if (chosen.length === 6) return chosen;
  }

  for (const w of shuffled) {
    if (!chosen.includes(w)) chosen.push(w);
    if (chosen.length === 6) break;
  }
  return chosen;
}

function startWordle() {
  game.innerHTML = "";
  wordleRow = 0;

  const options = pickWordleOptions(5);
  wordleAnswer = options[Math.floor(Math.random() * 6)];

  wordleGridEl = document.createElement("div");
  wordleGridEl.id = "wordleGrid";

  for (let r = 0; r < 6; r++) {
    const row = document.createElement("div");
    row.className = "wordleRow";
    row.style.gridTemplateColumns = "repeat(5, 50px)";
    for (let i = 0; i < 5; i++) {
      row.appendChild(document.createElement("div")).className = "tile";
    }
    wordleGridEl.appendChild(row);
  }

  game.appendChild(wordleGridEl);

  const choices = document.createElement("div");
  choices.id = "choices";
  options.forEach(w => {
    const b = document.createElement("button");
    b.textContent = w;
    b.onclick = () => guessWord(w, b);
    choices.appendChild(b);
  });
  game.appendChild(choices);

  message.textContent = "Choose a word";
}

function guessWord(word, btn) {
  btn.disabled = true;
  const tiles = wordleGridEl.children[wordleRow].children;

  for (let i = 0; i < 5; i++) {
    tiles[i].textContent = word[i];
    tiles[i].className = "tile " +
      (word[i] === wordleAnswer[i] ? "correct" :
       wordleAnswer.includes(word[i]) ? "wrong" : "incorrect");
  }

  if (word === wordleAnswer) {
    message.textContent = "✅ Correct!";
    return;
  }

  wordleRow++;
  if (wordleRow === 6) {
    message.textContent = `❌ The word was ${wordleAnswer}`;
  }
}

/* =====================================================
   CONNECTIONS LOGIC
===================================================== */
let connectionsSolutions = [];
let selectedTiles = [];

function startConnections() {
  game.innerHTML = "";
  message.textContent = "Select 4 words and submit";

  const topicKeys = Object.keys(TOPICS).sort(() => Math.random() - 0.5);
  connectionsSolutions = [];
  const usedWords = new Set();

  for (const key of topicKeys) {
    const available = TOPICS[key].filter(w => !usedWords.has(w));
    if (available.length >= 4) {
      const group = available.sort(() => Math.random() - 0.5).slice(0, 4);
      group.forEach(w => usedWords.add(w));
      connectionsSolutions.push(group);
    }
    if (connectionsSolutions.length === 4) break;
  }

  const words = connectionsSolutions.flat().sort(() => Math.random() - 0.5);
  const grid = document.createElement("div");
  grid.className = "connectionsGrid";

  words.forEach(word => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = word;
    tile.onclick = () => toggleTile(tile);
    grid.appendChild(tile);
  });

  game.appendChild(grid);

  const submitBtn = document.createElement("button");
  submitBtn.textContent = "Submit Group";
  submitBtn.onclick = submitConnections;
  game.appendChild(submitBtn);
}

function toggleTile(tile) {
  if (tile.classList.contains("solved")) return;

  tile.classList.toggle("selected");
  selectedTiles = [...document.querySelectorAll(".selected")];

  if (selectedTiles.length > 4) {
    selectedTiles[0].classList.remove("selected");
  }
}

function submitConnections() {
  if (selectedTiles.length !== 4) return;

  const attempt = selectedTiles.map(t => t.textContent);
  const match = connectionsSolutions.find(g => attempt.every(w => g.includes(w)));

  if (match) {
    selectedTiles.forEach(t => {
      t.classList.remove("selected");
      t.classList.add("solved");
      t.onclick = null;
    });
    message.textContent = "✅ Correct group!";
  } else {
    selectedTiles.forEach(t => t.classList.remove("selected"));
    message.textContent = "❌ Not a group";
  }

  selectedTiles = [];
}

/* =====================================================
   NEW GAME
===================================================== */
function newGame() {
  game.innerHTML = "";
  message.textContent = "Choose a game";
}
</script>

</body>
</html>
